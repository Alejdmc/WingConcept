# ============================================================
# WingConcept — Nginx Configuration
# Proxy reverso para FastAPI backend
# SSL con Let's Encrypt + Certbot
# ============================================================

# Limitar conexiones por IP (rate limiting HTTP)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

upstream backend {
    server backend:8000;
    keepalive 32;
}

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    # CAMBIAR por el dominio real
    server_name wingconcept.com www.wingconcept.com;

    # ── SSL — Let's Encrypt ───────────────────────────────────────────────────
    # Certificados gestionados por Certbot
    # Obtener: docker-compose run --rm certbot certonly --webroot \
    #   -w /var/www/certbot -d wingconcept.com --email admin@wingconcept.com --agree-tos
    ssl_certificate /etc/letsencrypt/live/wingconcept.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wingconcept.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    # ── Headers de seguridad ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

    client_max_body_size 2M;

    # ── Webhooks — sin rate limiting (llamados por Wompi/Stripe) ──────────────
    location ~ ^/api/v1/webhooks/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_request_buffering on;
    }

    # ── Auth — rate limiting estricto ─────────────────────────────────────────
    location ~ ^/api/v1/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # ── API general ───────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # ── Docs (desactivados en producción) ────────────────────────────────────
    location ~ ^/(docs|redoc|openapi.json) {
        return 404;
        # En desarrollo, comentar línea anterior y descomentar: proxy_pass http://backend;
    }

    location /health {
        proxy_pass http://backend;
        access_log off;
    }
}

