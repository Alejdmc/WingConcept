name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: backend

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wingconcept_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci_test_secret_key_minimum_32_characters_long
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/wingconcept_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      ALLOWED_HOSTS: localhost,127.0.0.1,test
      ALLOWED_ORIGINS: http://localhost:3000
      FRONTEND_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Lint (flake8 — errores críticos)
        run: flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Build Docker image
        run: docker build -t wingconcept-backend:ci .
